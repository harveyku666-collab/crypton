<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitInfo - 数字货币智能分析平台</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 24px;
  text-align: center;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header p {
  color: var(--text2);
  font-size: 15px;
}
.header .stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 20px;
}
.header .stat {
  text-align: center;
}
.header .stat-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}
.header .stat-label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: rgba(88,166,255,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.card-icon {
  font-size: 32px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 10px;
  flex-shrink: 0;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.card-subtitle {
  font-size: 12px;
  color: var(--text2);
}
.card-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(88,166,255,0.1);
  color: var(--accent);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.status {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
}
.status-active { background: rgba(63,185,80,0.15); color: var(--green); }
.status-beta { background: rgba(210,153,34,0.15); color: var(--orange); }
.status-planned { background: rgba(139,148,158,0.15); color: var(--text2); }
.card-arrow {
  color: var(--text2);
  font-size: 18px;
  transition: transform 0.2s;
}
.card:hover .card-arrow { transform: translateX(4px); color: var(--accent); }

/* Detail modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.modal-icon {
  font-size: 40px;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 14px;
}
.modal-title { font-size: 22px; font-weight: 700; }
.modal-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
.modal-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 24px;
}
.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}
.feature-list {
  list-style: none;
  margin-bottom: 24px;
}
.feature-list li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  font-size: 13px;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.feature-list li::before {
  content: '✓';
  color: var(--green);
  font-weight: bold;
  flex-shrink: 0;
}
.source-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.source-tag {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.btn-primary {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  padding: 10px 24px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.loading {
  text-align: center;
  padding: 60px;
  color: var(--text2);
}
.loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#briefing-content {
  margin-top: 20px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 20px;
  font-size: 13px;
  line-height: 1.7;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  display: none;
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .header .stats { gap: 16px; }
  .modal { padding: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>BitInfo 智能分析平台</h1>
  <p>融合多个 AI 技能，帮你发现有潜力的数字货币和收益机会</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="active-count">-</div>
      <div class="stat-label">已上线技能</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="source-count">-</div>
      <div class="stat-label">数据源</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-count">-</div>
      <div class="stat-label">总技能数</div>
    </div>
  </div>
</div>

<div class="container">
  <div style="margin-bottom:24px;background:linear-gradient(135deg,rgba(88,166,255,0.08),rgba(188,140,255,0.08));border:1px solid rgba(88,166,255,0.25);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;cursor:pointer;transition:all 0.25s" onclick="location.href='/daily'" onmouseover="this.style.borderColor='var(--accent)';this.style.transform='translateY(-1px)'" onmouseout="this.style.borderColor='rgba(88,166,255,0.25)';this.style.transform='none'">
    <div style="display:flex;align-items:center;gap:16px">
      <div style="font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(88,166,255,0.12);border-radius:12px">📊</div>
      <div>
        <div style="font-size:18px;font-weight:700">每日市场简报</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">聚合全市场数据 — 价格 · 情绪 · 技术分析 · BTC 15分钟预测 · DeFi · 新闻 · 周期指标</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="padding:6px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-weight:600">查看日报 →</span>
    </div>
  </div>

  <div class="filter-bar" id="filters"></div>
  <div class="grid" id="skill-grid"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>加载技能列表...</div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const API = '/api/v1';
let allSkills = [];
let currentFilter = 'all';

async function loadSkills() {
  try {
    const resp = await fetch(`${API}/skills`);
    allSkills = await resp.json();
    renderStats();
    renderFilters();
    renderGrid();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:var(--red)">加载失败: ' + e.message + '</div>';
  }
}

function renderStats() {
  const active = allSkills.filter(s => s.status === 'active').length;
  const sources = new Set();
  allSkills.forEach(s => s.data_sources.forEach(d => sources.add(d)));
  document.getElementById('active-count').textContent = active;
  document.getElementById('source-count').textContent = sources.size;
  document.getElementById('total-count').textContent = allSkills.length;
}

function renderFilters() {
  const cats = new Set(allSkills.map(s => s.category));
  const catLabels = {
    all: '全部', market: '行情', analysis: '分析',
    defi: 'DeFi', news: '新闻', onchain: '链上',
    ai: 'AI', trading: '交易'
  };
  let html = `<button class="filter-btn active" data-cat="all">全部</button>`;
  cats.forEach(c => {
    html += `<button class="filter-btn" data-cat="${c}">${catLabels[c] || c}</button>`;
  });
  const bar = document.getElementById('filters');
  bar.innerHTML = html;
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      currentFilter = btn.dataset.cat;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
  });
}

function renderGrid() {
  document.getElementById('loading').style.display = 'none';
  const filtered = currentFilter === 'all'
    ? allSkills
    : allSkills.filter(s => s.category === currentFilter);

  const statusLabel = { active: '已上线', beta: '测试中', planned: '规划中' };

  document.getElementById('skill-grid').innerHTML = filtered.map(s => `
    <div class="card" onclick="openDetail('${s.id}')">
      <div class="card-top">
        <div class="card-icon">${s.icon}</div>
        <div>
          <div class="card-title">${s.name_zh}</div>
          <div class="card-subtitle">${s.name}</div>
        </div>
      </div>
      <div class="card-desc">${s.description_zh}</div>
      <div class="card-tags">
        ${s.data_sources.map(d => `<span class="tag">${d}</span>`).join('')}
      </div>
      <div class="card-footer">
        <span class="status status-${s.status}">${statusLabel[s.status] || s.status}</span>
        <span class="card-arrow">→</span>
      </div>
    </div>
  `).join('');
}

async function openDetail(id) {
  const s = allSkills.find(sk => sk.id === id);
  if (!s) return;

  const statusLabel = { active: '已上线', beta: '测试中', planned: '规划中' };

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-icon">${s.icon}</div>
      <div>
        <div class="modal-title">${s.name_zh}</div>
        <div class="modal-subtitle">${s.name} · <span class="status status-${s.status}">${statusLabel[s.status]}</span></div>
      </div>
    </div>
    <div class="modal-desc">${s.description_zh}</div>

    <h3>功能特性</h3>
    <ul class="feature-list">
      ${s.features_zh.map(f => `<li>${f}</li>`).join('')}
    </ul>

    <h3>数据来源</h3>
    <div class="source-list">
      ${s.data_sources.map(d => `<span class="source-tag">${d}</span>`).join('')}
    </div>

    <div class="modal-actions">
      <button class="btn-primary" onclick="viewReport('${s.id}')">查看实时简报</button>
      <button class="btn-secondary" onclick="closeModal()">关闭</button>
    </div>
    <div id="briefing-content"></div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

function viewReport(skillId) {
  location.href = `/skill?id=${skillId}`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadSkills();
</script>
</body>
</html>
