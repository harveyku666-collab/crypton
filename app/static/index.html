<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitInfo - 数字货币智能分析平台</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 24px;
  text-align: center;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.header p {
  color: var(--text2);
  font-size: 15px;
}
.header .stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 20px;
}
.header .stat {
  text-align: center;
}
.header .stat-num {
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}
.header .stat-label {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: rgba(88,166,255,0.15);
  border-color: var(--accent);
  color: var(--accent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 12px;
}
.card-icon {
  font-size: 32px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 10px;
  flex-shrink: 0;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.card-subtitle {
  font-size: 12px;
  color: var(--text2);
}
.card-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(88,166,255,0.1);
  color: var(--accent);
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.status {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
}
.status-active { background: rgba(63,185,80,0.15); color: var(--green); }
.status-beta { background: rgba(210,153,34,0.15); color: var(--orange); }
.status-planned { background: rgba(139,148,158,0.15); color: var(--text2); }
.card-arrow {
  color: var(--text2);
  font-size: 18px;
  transition: transform 0.2s;
}
.card:hover .card-arrow { transform: translateX(4px); color: var(--accent); }

/* Detail modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text2);
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.modal-icon {
  font-size: 40px;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 14px;
}
.modal-title { font-size: 22px; font-weight: 700; }
.modal-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
.modal-desc {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 24px;
}
.modal h3 {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--accent);
}
.feature-list {
  list-style: none;
  margin-bottom: 24px;
}
.feature-list li {
  padding: 8px 0;
  border-bottom: 1px solid rgba(48,54,61,0.5);
  font-size: 13px;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.feature-list li::before {
  content: '✓';
  color: var(--green);
  font-weight: bold;
  flex-shrink: 0;
}
.source-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.source-tag {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.btn-primary {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  padding: 10px 24px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.loading {
  text-align: center;
  padding: 60px;
  color: var(--text2);
}
.loading .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#briefing-content {
  margin-top: 20px;
  background: var(--surface2);
  border-radius: 10px;
  padding: 20px;
  font-size: 13px;
  line-height: 1.7;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  display: none;
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .header .stats { gap: 16px; }
  .modal { padding: 20px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>BitInfo 智能分析平台</h1>
  <p>融合多个 AI 技能，帮你发现有潜力的数字货币和收益机会</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="active-count">-</div>
      <div class="stat-label">已上线技能</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="source-count">-</div>
      <div class="stat-label">数据源</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-count">-</div>
      <div class="stat-label">总技能数</div>
    </div>
  </div>
</div>

<div class="container">
  <div style="margin-bottom:24px;background:linear-gradient(135deg,rgba(88,166,255,0.08),rgba(188,140,255,0.08));border:1px solid rgba(88,166,255,0.25);border-radius:14px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;cursor:pointer;transition:all 0.25s" onclick="location.href=(typeof BASE!=='undefined'?BASE:'')+'/daily'" onmouseover="this.style.borderColor='var(--accent)';this.style.transform='translateY(-1px)'" onmouseout="this.style.borderColor='rgba(88,166,255,0.25)';this.style.transform='none'">
    <div style="display:flex;align-items:center;gap:16px">
      <div style="font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:rgba(88,166,255,0.12);border-radius:12px">📊</div>
      <div>
        <div style="font-size:18px;font-weight:700">每日市场简报</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">聚合全市场数据 — 价格 · 情绪 · 技术分析 · BTC 15分钟预测 · DeFi · 新闻 · 周期指标</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="padding:6px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-weight:600">查看日报 →</span>
    </div>
  </div>

  <div style="margin-bottom:24px;position:relative;overflow:hidden;background:linear-gradient(140deg,rgba(17,24,39,.96),rgba(13,20,31,.94));border:1px solid rgba(88,166,255,0.22);border-radius:18px;padding:22px 24px;box-shadow:0 18px 42px rgba(0,0,0,.2)">
    <div style="position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(88,166,255,.16),transparent 68%);pointer-events:none"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative">
      <div style="max-width:620px">
        <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">OI Quick Launch</div>
        <div style="font-size:22px;font-weight:800;margin-bottom:8px">搜索任意代币，直接进入 OI 信号研判</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.8">输入币种符号后，一步跳转到完整 OI 仪表盘，直接看评分、Funding、盘口、筹码分布和订单流。</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;min-width:320px;flex:1">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <input id="oi-launch-symbol" placeholder="DOGE / XRP / 1000SHIB / BNBUSDT" style="flex:1;min-width:180px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:14px;outline:none">
          <select id="oi-launch-timeframe" style="padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:14px;outline:none">
            <option value="15m">15m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
          </select>
          <button class="btn-primary" style="white-space:nowrap" onclick="launchOiSignal()">立即分析</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="tag" style="cursor:pointer" onclick="launchOiSignal('DOGE')">DOGE</button>
          <button class="tag" style="cursor:pointer" onclick="launchOiSignal('XRP')">XRP</button>
          <button class="tag" style="cursor:pointer" onclick="launchOiSignal('1000SHIB')">1000SHIB</button>
          <button class="tag" style="cursor:pointer" onclick="launchOiSignal('BNB')">BNB</button>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="filters"></div>
  <div class="grid" id="skill-grid"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>加载技能列表...</div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const BASE = location.pathname.replace(/\/(skill|daily|briefing)?\s*$/,'').replace(/\/+$/,'');
const API = BASE + '/api/v1';
let allSkills = [];
let currentFilter = 'all';

async function loadSkills() {
  try {
    const resp = await fetch(`${API}/skills`);
    allSkills = await resp.json();
    renderStats();
    renderFilters();
    renderGrid();
  } catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:var(--red)">加载失败: ' + e.message + '</div>';
  }
}

function renderStats() {
  const active = allSkills.filter(s => s.status === 'active').length;
  const sources = new Set();
  allSkills.forEach(s => s.data_sources.forEach(d => sources.add(d)));
  document.getElementById('active-count').textContent = active;
  document.getElementById('source-count').textContent = sources.size;
  document.getElementById('total-count').textContent = allSkills.length;
}

function renderFilters() {
  const cats = new Set(allSkills.filter(s => s.category !== 'pro').map(s => s.category));
  const catLabels = {
    all: '全部', trading: '交易', market: '行情', analysis: '分析',
    onchain: '链上', social: '社交', defi: 'DeFi', news: '新闻',
    ai: 'AI', utility: '工具'
  };
  let html = `<button class="filter-btn active" data-cat="all">全部</button>`;
  cats.forEach(c => {
    html += `<button class="filter-btn" data-cat="${c}">${catLabels[c] || c}</button>`;
  });
  const bar = document.getElementById('filters');
  bar.innerHTML = html;
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      currentFilter = btn.dataset.cat;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
  });
}

function renderGrid() {
  document.getElementById('loading').style.display = 'none';
  const freeSkills = currentFilter === 'all'
    ? allSkills.filter(s => s.category !== 'pro')
    : allSkills.filter(s => s.category === currentFilter && s.category !== 'pro');
  const proSkill = allSkills.find(s => s.category === 'pro');

  const statusLabel = { active: '已上线', beta: '测试中', planned: '规划中' };

  let html = freeSkills.map(s => `
    <div class="card" onclick="openDetail('${s.id}')">
      <div class="card-top">
        <div class="card-icon">${s.icon}</div>
        <div>
          <div class="card-title">${s.name_zh}</div>
          <div class="card-subtitle">${s.name}</div>
        </div>
      </div>
      <div class="card-desc">${s.description_zh}</div>
      <div class="card-tags">
        <span class="tag" style="background:rgba(63,185,80,0.12);color:#3fb950">免费</span>
        ${s.data_sources.map(d => `<span class="tag">${d}</span>`).join('')}
      </div>
      <div class="card-footer">
        <span class="status status-${s.status}">${statusLabel[s.status] || s.status}</span>
        <span class="card-arrow">→</span>
      </div>
    </div>
  `).join('');

  if (proSkill && currentFilter === 'all') {
    html += `
    <div class="card" onclick="viewReport('${proSkill.id}')" style="border-color:rgba(188,140,255,0.4);background:linear-gradient(135deg,#161b22 0%,#1a1930 100%);grid-column:1/-1">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
        <div style="display:flex;align-items:center;gap:16px">
          <div class="card-icon" style="font-size:36px;width:56px;height:56px;background:rgba(188,140,255,0.12)">${proSkill.icon}</div>
          <div>
            <div class="card-title" style="font-size:18px">${proSkill.name_zh}
              <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(188,140,255,0.15);color:var(--purple);margin-left:8px;vertical-align:middle">需要 Credits</span>
            </div>
            <div class="card-subtitle">${proSkill.description_zh}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:13px;color:var(--text2)">80+ 专业工具</span>
          <span style="padding:8px 18px;background:var(--purple);color:#fff;border-radius:8px;font-size:13px;font-weight:600">查看全部 →</span>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('skill-grid').innerHTML = html;
}

async function openDetail(id) {
  const s = allSkills.find(sk => sk.id === id);
  if (!s) return;

  const statusLabel = { active: '已上线', beta: '测试中', planned: '规划中' };
  const isOiSignal = s.id === 'oi-signal';
  const isDefiYield = s.id === 'defi-yield-scanner';
  const isTechnicalAnalysis = s.id === 'technical-analysis';
  const isPredictionMarkets = s.id === 'prediction-markets';
  const isMarketRank = s.id === 'crypto-market-rank';
  const isMarketIntel = s.id === 'market-intel';
  const isOkxIntelligence = s.id === 'okx-intelligence';
  const primaryLabel = isOiSignal ? '进入 OI 仪表盘' : isDefiYield ? '进入收益仪表盘' : isTechnicalAnalysis ? '进入技术分析' : isPredictionMarkets ? '进入预测市场' : isMarketRank ? '进入市场榜单台' : isMarketIntel ? '进入市场情报大师' : isOkxIntelligence ? '进入 OKX 情报台' : '查看实时简报';
  const oiLaunchBlock = isOiSignal ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(88,166,255,.22);background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(188,140,255,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接搜索代币</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">输入币种后直接跳到 OI 研判页，支持快捷查看山寨币或指定交易周期。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="modal-oi-symbol" value="BTC" placeholder="DOGE / XRP / 1000SHIB" style="flex:1;min-width:180px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <select id="modal-oi-timeframe" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="15m">15m</option>
          <option value="1h" selected>1h</option>
          <option value="4h">4h</option>
          <option value="1d">1d</option>
        </select>
        <button class="btn-primary" onclick="launchOiSignal(document.getElementById('modal-oi-symbol').value,document.getElementById('modal-oi-timeframe').value)">打开分析页</button>
      </div>
    </div>
  ` : '';
  const yieldLaunchBlock = isDefiYield ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(50,194,116,.22);background:linear-gradient(135deg,rgba(50,194,116,.09),rgba(255,203,103,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开收益仪表盘</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">先筛链、最低 APY 和 TVL，再进入完整收益池界面继续扫描。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <select id="modal-yield-chain" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="">All Chains</option>
          <option value="Ethereum">Ethereum</option>
          <option value="Arbitrum">Arbitrum</option>
          <option value="Base">Base</option>
          <option value="BNB Chain">BNB Chain</option>
          <option value="Solana">Solana</option>
        </select>
        <input id="modal-yield-symbol" placeholder="ETH / USDC / BTC" style="flex:1;min-width:150px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <input id="modal-yield-min-apy" type="number" min="0" step="0.1" value="5" placeholder="Min APY" style="width:110px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">

    </div>
  ` : '';
  const technicalLaunchBlock = isTechnicalAnalysis ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(88,166,255,.22);background:linear-gradient(135deg,rgba(88,166,255,.09),rgba(63,185,80,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开技术分析</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">输入币种和周期后，直接进入可视化技术分析页，查看 RSI、MACD、布林带、均线和多周期摘要。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="modal-ta-symbol" value="BTC" placeholder="BTC / ETH / SOL / AAVE" style="flex:1;min-width:170px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <select id="modal-ta-timeframe" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="15m">15m</option>
          <option value="1h">1h</option>
          <option value="4h" selected>4h</option>
          <option value="1d">1d</option>
        </select>
        <button class="btn-primary" onclick="launchTechnicalAnalysis(document.getElementById('modal-ta-symbol').value,document.getElementById('modal-ta-timeframe').value)">打开分析页</button>
      </div>
    </div>
  ` : '';
  const predictionLaunchBlock = isPredictionMarkets ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(188,140,255,.22);background:linear-gradient(135deg,rgba(188,140,255,.10),rgba(88,166,255,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开预测市场</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">按 24h 成交量扫描 Polymarket 热门事件，先看最热话题、Yes 概率和流动性。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <select id="modal-prediction-limit" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="5">Top 5</option>
          <option value="10" selected>Top 10</option>
          <option value="20">Top 20</option>
        </select>
        <button class="btn-primary" onclick="launchPredictionMarkets(document.getElementById('modal-prediction-limit').value)">打开事件页</button>
      </div>
    </div>
  ` : '';
  const marketRankLaunchBlock = isMarketRank ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(101,183,255,.22);background:linear-gradient(135deg,rgba(101,183,255,.10),rgba(85,210,141,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开市场榜单台</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">从趋势币、热搜、Alpha、社交热度和聪明钱流入几个维度一起看市场。可以先选链和榜单类型，再跳到完整页面。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="modal-rank-keyword" placeholder="DOGE / AI / ETF / MEME" style="flex:1;min-width:170px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <select id="modal-rank-type" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="10" selected>Trending</option>
          <option value="11">Top Search</option>
          <option value="20">Alpha</option>
          <option value="40">Stock</option>
        </select>
        <select id="modal-rank-chain" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="56" selected>BSC</option>
          <option value="8453">Base</option>
          <option value="CT_501">Solana</option>
          <option value="1">Ethereum</option>
        </select>
        <button class="btn-primary" onclick="launchCryptoMarketRank({keyword:document.getElementById('modal-rank-keyword').value,rankType:document.getElementById('modal-rank-type').value,chainId:document.getElementById('modal-rank-chain').value})">打开榜单页</button>
      </div>
    </div>
  ` : '';
  const okxLaunchBlock = isOkxIntelligence ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(97,217,255,.22);background:linear-gradient(135deg,rgba(97,217,255,.09),rgba(117,222,143,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开 OKX 市场情报台</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">输入币种、选择现货/永续和分析周期后，直接进入 OKX 行情 + Orbit 新闻 + 情绪一体仪表盘。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="modal-okx-symbol" value="BTC" placeholder="BTC / ETH / DOGE / AAPL-USDT-SWAP" style="flex:1;min-width:190px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <select id="modal-okx-market-type" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="SWAP" selected>永续合约</option>
          <option value="SPOT">现货</option>
        </select>
        <select id="modal-okx-timeframe" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="1H" selected>1H</option>
          <option value="4H">4H</option>
          <option value="1D">1D</option>
        </select>
        <button class="btn-primary" onclick="launchOkxIntelligence(document.getElementById('modal-okx-symbol').value,document.getElementById('modal-okx-market-type').value,document.getElementById('modal-okx-timeframe').value)">打开情报台</button>
      </div>
    </div>
  ` : '';
  const marketIntelLaunchBlock = isMarketIntel ? `
    <div style="margin:18px 0 6px;padding:16px;border-radius:14px;border:1px solid rgba(217,143,55,.24);background:linear-gradient(135deg,rgba(217,143,55,.10),rgba(15,143,143,.08))">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">直接打开市场情报大师</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:12px">用一个币种 + 一个关键词，直接生成 Daily Brief、异动提醒和关键词研究，适合先判断叙事，再决定是否继续深挖。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="modal-market-intel-symbol" value="BTC" placeholder="BTC / ETH / DOGE / BTC-USDT-SWAP" style="flex:1;min-width:190px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <select id="modal-market-intel-type" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="SWAP" selected>永续合约</option>
          <option value="SPOT">现货</option>
        </select>
        <select id="modal-market-intel-timeframe" style="padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
          <option value="1H" selected>1H</option>
          <option value="4H">4H</option>
          <option value="1D">1D</option>
        </select>
        <input id="modal-market-intel-keyword" value="ETF" placeholder="ETF / AI / 监管 / Meme" style="flex:1;min-width:160px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px">
        <button class="btn-primary" onclick="launchMarketIntel(document.getElementById('modal-market-intel-symbol').value,document.getElementById('modal-market-intel-type').value,document.getElementById('modal-market-intel-timeframe').value,document.getElementById('modal-market-intel-keyword').value)">打开情报台</button>
      </div>
    </div>
  ` : '';

  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-icon">${s.icon}</div>
      <div>
        <div class="modal-title">${s.name_zh}</div>
        <div class="modal-subtitle">${s.name} · <span class="status status-${s.status}">${statusLabel[s.status]}</span></div>
      </div>
    </div>
    <div class="modal-desc">${s.description_zh}</div>

    <h3>功能特性</h3>
    <ul class="feature-list">
      ${s.features_zh.map(f => `<li>${f}</li>`).join('')}
    </ul>

    <h3>数据来源</h3>
    <div class="source-list">
      ${s.data_sources.map(d => `<span class="source-tag">${d}</span>`).join('')}
    </div>

    ${oiLaunchBlock}
    ${yieldLaunchBlock}
    ${technicalLaunchBlock}
    ${predictionLaunchBlock}
    ${marketRankLaunchBlock}
    ${marketIntelLaunchBlock}
    ${okxLaunchBlock}

    <div class="modal-actions">
      <button class="btn-primary" onclick="viewReport('${s.id}')">${primaryLabel}</button>
      <button class="btn-secondary" onclick="closeModal()">关闭</button>
    </div>
    <div id="briefing-content"></div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};

function viewReport(skillId) {
  const pages = {'oi-signal':'/oi-signal','market-briefing':'/briefing','defi-yield-scanner':'/defi-yield-scanner','crypto-market-rank':'/market-rank','market-intel':'/market-intel','okx-intelligence':'/okx-intelligence'};
  location.href = pages[skillId] ? `${BASE}${pages[skillId]}` : `${BASE}/skill?id=${skillId}`;
}

function sanitizeSymbol(value){
  if(!value)return'';
  let symbol=String(value).trim().toUpperCase();
  symbol=symbol.replace(/\s+/g,'').replace(/[-_/]/g,'');
  symbol=symbol.replace(/USDT$/,'').replace(/USD$/,'').replace(/PERP$/,'').replace(/SWAP$/,'');
  symbol=symbol.replace(/[^A-Z0-9]/g,'');
  return symbol.slice(0,20);
}

function sanitizeYieldKeyword(value){
  if(!value)return'';
  return String(value).trim().toUpperCase().replace(/\s+/g,'').replace(/[^A-Z0-9:/_-]/g,'').slice(0,32);
}

function sanitizeMarketRankKeyword(value){
  if(!value)return'';
  return String(value).replace(/\s+/g,' ').trim().slice(0,40);
}

function launchOiSignal(rawSymbol,timeframe){
  const symbol=sanitizeSymbol(rawSymbol??document.getElementById('oi-launch-symbol')?.value)||'BTC';
  const tf=timeframe||document.getElementById('oi-launch-timeframe')?.value||'1h';
  location.href=`${BASE}/oi-signal?symbol=${encodeURIComponent(symbol)}&timeframe=${encodeURIComponent(tf)}`;
}

function launchTechnicalAnalysis(rawSymbol,timeframe){
  const symbol=sanitizeSymbol(rawSymbol??document.getElementById('modal-ta-symbol')?.value)||'BTC';
  const tf=timeframe||document.getElementById('modal-ta-timeframe')?.value||'4h';
  const params=new URLSearchParams();
  params.set('id','technical-analysis');
  params.set('symbol',symbol);
  params.set('interval',tf);
  params.set('limit','120');
  location.href=`${BASE}/skill?${params.toString()}`;
}

function launchPredictionMarkets(limit='10'){
  const params=new URLSearchParams();
  params.set('id','prediction-markets');
  params.set('limit',String(Number(limit||10)));
  location.href=`${BASE}/skill?${params.toString()}`;
}

function launchCryptoMarketRank({keyword='',rankType='10',chainId='56',period='50',targetLanguage='zh'}={}){
  const params=new URLSearchParams();
  const q=sanitizeMarketRankKeyword(keyword);
  if(q)params.set('q',q);
  params.set('rankType',['10','11','20','40'].includes(String(rankType))?String(rankType):'10');
  params.set('chainId',['56','8453','CT_501','1'].includes(String(chainId))?String(chainId):'56');
  params.set('period',['10','20','30','40','50'].includes(String(period))?String(period):'50');
  params.set('targetLanguage',targetLanguage==='en'?'en':'zh');
  location.href=`${BASE}/market-rank?${params.toString()}`;
}

function launchOkxIntelligence(rawSymbol,marketType='SWAP',timeframe='1H'){
  const raw=String(rawSymbol??'').trim().toUpperCase();
  const symbol=raw||'BTC';
  const type=marketType==='SPOT'?'SPOT':'SWAP';
  const tf=['1H','4H','1D'].includes(String(timeframe).toUpperCase())?String(timeframe).toUpperCase():'1H';
  const params=new URLSearchParams();
  params.set('symbol',symbol);
  params.set('marketType',type);
  params.set('timeframe',tf);
  location.href=`${BASE}/okx-intelligence?${params.toString()}`;
}

function launchMarketIntel(rawSymbol,marketType='SWAP',timeframe='1H',keyword=''){
  const raw=String(rawSymbol??'').trim().toUpperCase();
  const symbol=raw||'BTC';
  const type=marketType==='SPOT'?'SPOT':'SWAP';
  const tf=['1H','4H','1D'].includes(String(timeframe).toUpperCase())?String(timeframe).toUpperCase():'1H';
  const q=String(keyword??'').replace(/\s+/g,' ').trim()||symbol;
  const params=new URLSearchParams();
  params.set('symbol',symbol);
  params.set('marketType',type);
  params.set('timeframe',tf);
  params.set('keyword',q);
  location.href=`${BASE}/market-intel?${params.toString()}`;
}

function launchDefiYieldScanner({chain='',symbol='',minApy='5',minTvl='10000000',limit='30'}={}){
  const params = new URLSearchParams();
  if(chain) params.set('chain', chain);
  if(symbol) params.set('symbol', sanitizeYieldKeyword(symbol));
  params.set('min_apy', String(Number(minApy||5)));
  params.set('min_tvl', String(Number(minTvl||10000000)));
  params.set('limit', String(Number(limit||30)));
  location.href=`${BASE}/defi-yield-scanner?${params.toString()}`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadSkills();
</script>
