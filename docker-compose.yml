services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bitinfo
      POSTGRES_USER: bitinfo
      POSTGRES_PASSWORD: bitinfo
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bitinfo:bitinfo@postgres:5432/bitinfo
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      PROXY_URL: ${PROXY_URL:-}
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
